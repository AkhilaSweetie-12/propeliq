name: Deploy Dev

on:
  push:
    branches: [develop]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=.propel/context/iac/gcp/terraform init
      - run: terraform -chdir=.propel/context/iac/gcp/terraform apply -auto-approve -var-file=environments/dev/terraform.tfvars
