name: Kubernetes Deployment

on:
  workflow_call:
    inputs:
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      cluster_name:
        description: 'GKE cluster name'
        required: true
        type: string
      cluster_zone:
        description: 'GKE cluster zone or region'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP project ID'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace'
        required: false
        type: string
        default: 'default'
      deploy_method:
        description: 'Deployment method: helm, kubectl, or kustomize'
        required: false
        type: string
        default: 'helm'
      helm_chart_path:
        description: 'Path to Helm chart (local) or chart name (remote)'
        required: false
        type: string
        default: './charts/app'
      helm_release_name:
        description: 'Helm release name'
        required: false
        type: string
        default: ''
      helm_values_file:
        description: 'Path to Helm values file'
        required: false
        type: string
        default: ''
      helm_set_values:
        description: 'Comma-separated key=value pairs for --set'
        required: false
        type: string
        default: ''
      kubectl_manifests:
        description: 'Path to kubectl manifests directory'
        required: false
        type: string
        default: './k8s'
      kustomize_path:
        description: 'Path to kustomize overlay'
        required: false
        type: string
        default: './k8s/overlays/production'
      image_tag:
        description: 'Container image tag to deploy'
        required: false
        type: string
        default: '${{ github.sha }}'
      image_repository:
        description: 'Container image repository'
        required: false
        type: string
        default: ''
      environment:
        description: 'GitHub deployment environment'
        required: false
        type: string
        default: 'production'
      dry_run:
        description: 'Perform a dry-run without applying'
        required: false
        type: boolean
        default: false
      wait_for_rollout:
        description: 'Wait for rollout to complete'
        required: false
        type: boolean
        default: true
      rollout_timeout:
        description: 'Rollout timeout (e.g. 5m, 10m)'
        required: false
        type: string
        default: '5m'
    outputs:
      deployment_status:
        description: 'Deployment result'
        value: ${{ jobs.deploy.outputs.status }}

jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      id-token: write
      contents: read
    outputs:
      status: ${{ steps.deploy.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials \
            "${{ inputs.cluster_name }}" \
            --zone "${{ inputs.cluster_zone }}" \
            --project "${{ inputs.gcp_project_id }}"
          echo "==> Connected to cluster: ${{ inputs.cluster_name }}"
          kubectl cluster-info

      - name: Create namespace
        run: |
          kubectl get namespace "${{ inputs.namespace }}" 2>/dev/null || \
            kubectl create namespace "${{ inputs.namespace }}"

      - name: Deploy via Helm
        if: inputs.deploy_method == 'helm'
        id: helm-deploy
        run: |
          set -euo pipefail
          RELEASE="${{ inputs.helm_release_name }}"
          if [ -z "$RELEASE" ]; then
            RELEASE=$(basename "${{ github.repository }}")
          fi

          HELM_ARGS="upgrade --install ${RELEASE} ${{ inputs.helm_chart_path }}"
          HELM_ARGS="${HELM_ARGS} --namespace ${{ inputs.namespace }}"
          HELM_ARGS="${HELM_ARGS} --set image.tag=${{ inputs.image_tag }}"

          if [ -n "${{ inputs.image_repository }}" ]; then
            HELM_ARGS="${HELM_ARGS} --set image.repository=${{ inputs.image_repository }}"
          fi

          if [ -n "${{ inputs.helm_values_file }}" ]; then
            HELM_ARGS="${HELM_ARGS} --values ${{ inputs.helm_values_file }}"
          fi

          if [ -n "${{ inputs.helm_set_values }}" ]; then
            IFS=',' read -ra PAIRS <<< "${{ inputs.helm_set_values }}"
            for pair in "${PAIRS[@]}"; do
              HELM_ARGS="${HELM_ARGS} --set ${pair}"
            done
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            HELM_ARGS="${HELM_ARGS} --dry-run"
          fi

          if [ "${{ inputs.wait_for_rollout }}" = "true" ]; then
            HELM_ARGS="${HELM_ARGS} --wait --timeout ${{ inputs.rollout_timeout }}"
          fi

          echo "==> helm ${HELM_ARGS}"
          helm ${HELM_ARGS}
          helm status "${RELEASE}" -n "${{ inputs.namespace }}"

      - name: Deploy via kubectl
        if: inputs.deploy_method == 'kubectl'
        id: kubectl-deploy
        run: |
          set -euo pipefail
          MANIFESTS="${{ inputs.kubectl_manifests }}"

          if [ -n "${{ inputs.image_repository }}" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "==> Updating image references in manifests"
            find "$MANIFESTS" -name '*.yml' -o -name '*.yaml' | xargs -I{} \
              sed -i "s|image:.*|image: ${{ inputs.image_repository }}:${{ inputs.image_tag }}|g" {}
          fi

          DRY_RUN=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN="--dry-run=client"
          fi

          echo "==> Applying manifests from $MANIFESTS"
          kubectl apply -f "$MANIFESTS" \
            --namespace "${{ inputs.namespace }}" \
            $DRY_RUN

      - name: Deploy via Kustomize
        if: inputs.deploy_method == 'kustomize'
        id: kustomize-deploy
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.image_repository }}" ]; then
            (cd "${{ inputs.kustomize_path }}" && \
              kustomize edit set image app=${{ inputs.image_repository }}:${{ inputs.image_tag }})
          fi

          DRY_RUN=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN="--dry-run=client"
          fi

          echo "==> Applying kustomize overlay: ${{ inputs.kustomize_path }}"
          kubectl apply -k "${{ inputs.kustomize_path }}" \
            --namespace "${{ inputs.namespace }}" \
            $DRY_RUN

      - name: Wait for rollout
        if: inputs.wait_for_rollout && inputs.dry_run == false
        run: |
          DEPLOYMENTS=$(kubectl get deployments -n "${{ inputs.namespace }}" -o jsonpath='{.items[*].metadata.name}')
          for dep in $DEPLOYMENTS; do
            echo "==> Waiting for deployment/$dep rollout"
            kubectl rollout status deployment/"$dep" \
              -n "${{ inputs.namespace }}" \
              --timeout="${{ inputs.rollout_timeout }}" || {
                echo "::error::Rollout failed for deployment/$dep"
                kubectl describe deployment/"$dep" -n "${{ inputs.namespace }}"
                exit 1
              }
          done

      - name: Capture deployment status
        id: deploy
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Cluster** | \`${{ inputs.cluster_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | \`${{ inputs.namespace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Method** | \`${{ inputs.deploy_method }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ inputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry Run** | \`${{ inputs.dry_run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
