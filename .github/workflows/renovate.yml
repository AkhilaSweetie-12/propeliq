name: Renovate

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'
        type: choice
        options:
          - info
          - debug
          - error
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write
  checks: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/renovatebot/renovate:38
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Docker Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Renovate
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
          RENOVATE_GIT_PRIVATE_KEY: ${{ secrets.RENOVATE_GIT_PRIVATE_KEY }}
          RENOVATE_PLATFORM: github
          RENOVATE_ENDPOINT: ${{ github.api_url }}
          RENOVATE_REPOSITORY: ${{ github.repository }}
          RENOVATE_LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
          RENOVATE_CONFIG_FILE: .github/workflows/shared-services/renovate/renovate.json
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENOVATE_HOST_RULES: '[{"hostType":"docker","matchHost":"ghcr.io","username":"${{ github.actor }}","password":"${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}"}]'
          LOG_LEVEL: ${{ github.event.inputs.logLevel || 'info' }}
        run: |
          renovate ${{ github.repository }}
