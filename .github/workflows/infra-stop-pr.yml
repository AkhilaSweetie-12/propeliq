# =============================================================================
# Infra Stop for PRs - Runs only when PR is closed
# =============================================================================

name: Infra Stop (PR Close)

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  id-token: write
  contents: read

env:
  INFRA_DIR: infra

jobs:
  infra-stop:
    name: 'Review: Infra Stop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: ./.github/workflows/shared-services/terraform/actions/cloud-auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init

      - name: Select review workspace
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          WORKSPACE="review-${{ github.event.pull_request.number }}"
          if terraform workspace list | grep -qw "$WORKSPACE"; then
            terraform workspace select "$WORKSPACE"
          else
            echo "::warning::Workspace $WORKSPACE does not exist. Nothing to destroy."
            exit 0
          fi

      - name: Terraform destroy
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform destroy -auto-approve

      - name: Delete workspace
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          terraform workspace select default
          terraform workspace delete -force "review-${{ github.event.pull_request.number }}"
        continue-on-error: true

      - name: Stop summary
        if: always()
        run: |
          echo "## Infra Stop" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **PR** | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workspace** | \`review-${{ github.event.pull_request.number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Destroy Status** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
