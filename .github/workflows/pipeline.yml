# =============================================================================
# PropelIQ CI/CD Pipeline
# =============================================================================
# Stage 1: Infra Init          -> infra init job
# Stage 2: Docker Build        -> docker build, docker package, docker sign jobs
# Stage 3: Analyze Code        -> cloud governance, security scan, iac scan jobs
# Stage 4: Deploy Master Review -> deploy master review job
# Stage 5: Deploy Review        -> infra plan, infra review, infra stop jobs
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, devops, 'feat/**']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write
  security-events: write
  issues: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ${{ github.repository_owner }}/propeliq-copilot
  RUNNER_IMAGE: ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest
  INFRA_DIR: infra

jobs:
  # ===========================================================================
  # STAGE 1: INFRA INIT
  # ===========================================================================
  infra-init:
    name: 'Init: Terraform Backend'
    runs-on: ubuntu-latest
    outputs:
      init_status: ${{ steps.init.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: ./.github/workflows/shared-services/foundation/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Terraform init
        id: init
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          set -euo pipefail
          echo "==> Initializing Terraform backend"
          terraform init
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.INFRA_DIR }}/.terraform/providers
            ${{ env.INFRA_DIR }}/.terraform/modules
          key: terraform-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', env.INFRA_DIR)) }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Init summary
        if: always()
        run: |
          echo "## Stage 1: Infra Init" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend Init** | \`${{ steps.init.outcome }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # STAGE 2: DOCKER BUILD
  # ===========================================================================
  docker-build:
    name: 'Build: Docker Build'
    runs-on: ubuntu-latest
    outputs:
      image_meta_tags: ${{ steps.meta.outputs.tags }}
      image_meta_labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.APP_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}}

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNNER_IMAGE=${{ env.RUNNER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "==> Testing image: $IMAGE"
          docker run --rm "$IMAGE" node --version
          docker run --rm "$IMAGE" terraform version
          echo "==> Image tests passed"

      - name: Build summary
        run: |
          echo "## Stage 2: Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.APP_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags** | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY

  docker-package:
    name: 'Build: Docker Package'
    needs: [docker-build]
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.APP_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNNER_IMAGE=${{ env.RUNNER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package summary
        run: |
          echo "## Stage 2: Docker Package" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pushed** | \`true\` |" >> $GITHUB_STEP_SUMMARY

  docker-sign:
    name: 'Build: Docker Sign'
    needs: [docker-package]
    runs-on: ubuntu-latest
    steps:
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.APP_IMAGE }}
          subject-digest: ${{ needs.docker-package.outputs.image_digest }}
          push-to-registry: true

      - name: Sign summary
        run: |
          echo "## Stage 2: Docker Sign" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.APP_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ needs.docker-package.outputs.image_digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Attestation** | \`signed\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # STAGE 3: ANALYZE CODE
  # ===========================================================================
  cloud-governance:
    name: 'Analyze: Cloud Governance'
    if: github.event_name == 'pull_request'
    needs: [docker-sign]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: ./.github/workflows/shared-services/foundation/actions/gcp-auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Policy as Code check
        run: |
          echo "==> Running policy checks"
          # Placeholder for policy check logic
          echo "Policy checks passed"

      - name: IAM audit
        run: |
          echo "==> Running IAM audit"
          # Placeholder for IAM audit logic
          echo "IAM audit passed"

      - name: Compliance scan
        run: |
          echo "==> Running compliance scan"
          # Placeholder for compliance scan logic
          echo "Compliance scan passed"

      - name: Governance summary
        if: always()
        run: |
          echo "## Stage 3: Cloud Governance" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Policy Check** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **IAM Audit** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Compliance Scan** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: 'Analyze: Security Scan'
    needs: [docker-sign]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        run: |
          echo "==> Running security scan"
          # Placeholder for security scan logic
          echo "Security scan completed"

      - name: Secret detection
        run: |
          echo "==> Running secret detection"
          # Placeholder for secret detection logic
          echo "Secret detection completed"

      - name: Security summary
        if: always()
        run: |
          echo "## Stage 3: Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trivy** | \`completed\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Secret Detection** | \`completed\` |" >> $GITHUB_STEP_SUMMARY

  iac-scan:
    name: 'Analyze: IaC Scan'
    needs: [docker-sign]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.INFRA_DIR }}
          soft_fail: true

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.INFRA_DIR }}
          soft_fail: true
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
        continue-on-error: true

      - name: Scan summary
        if: always()
        run: |
          echo "## Stage 3: IaC Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **tfsec** | \`completed\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **checkov** | \`completed\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # STAGE 4: DEPLOY MASTER REVIEW (main branch push only)
  # ===========================================================================
  deploy-master-review:
    name: 'Deploy: Master Review'
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [iac-scan, docker-sign]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: ./.github/workflows/shared-services/terraform/actions/cloud-auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          terraform plan -detailed-exitcode -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Deploy summary
        if: always()
        run: |
          echo "## Stage 4: Deploy Master Review" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Terraform Deploy** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # STAGE 5: DEPLOY REVIEW (PR only)
  # ===========================================================================
  infra-plan:
    name: 'Review: Infra Plan'
    if: github.event_name == 'pull_request'
    needs: [iac-scan]
    runs-on: ubuntu-latest
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: ./.github/workflows/shared-services/terraform/actions/cloud-auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init

      - name: Create/select review workspace
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          WORKSPACE="review-${{ github.event.pull_request.number }}"
          if terraform workspace list | grep -qw "$WORKSPACE"; then
            terraform workspace select "$WORKSPACE"
          else
            terraform workspace new "$WORKSPACE"
            terraform workspace select "$WORKSPACE"
          fi

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          terraform plan -detailed-exitcode -out=tfplan
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Save plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.pull_request.number }}
          path: ${{ env.INFRA_DIR }}/tfplan
          retention-days: 7

      - name: Plan summary
        if: always()
        run: |
          echo "## Stage 5: Infra Plan" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **PR** | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workspace** | \`review-${{ github.event.pull_request.number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Plan Status** | \`${{ steps.plan.outcome }}\` |" >> $GITHUB_STEP_SUMMARY

  infra-review:
    name: 'Review: Infra Review'
    if: github.event_name == 'pull_request'
    needs: [infra-plan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: ./.github/workflows/shared-services/terraform/actions/cloud-auth
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.pull_request.number }}
          path: ${{ env.INFRA_DIR }}

      - name: Terraform init
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform init

      - name: Select review workspace
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          WORKSPACE="review-${{ github.event.pull_request.number }}"
          terraform workspace select "$WORKSPACE"

      - name: Terraform apply
        working-directory: ${{ env.INFRA_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Review summary
        if: always()
        run: |
          echo "## Stage 5: Infra Review" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **PR** | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workspace** | \`review-${{ github.event.pull_request.number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Apply Status** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY

  
  # ===========================================================================
  # PIPELINE SUMMARY
  # ===========================================================================
  pipeline-summary:
    name: Pipeline Summary
    if: always()
    needs:
      - infra-init
      - docker-build
      - docker-package
      - docker-sign
      - cloud-governance
      - security-scan
      - iac-scan
      - deploy-master-review
      - infra-plan
      - infra-review
    runs-on: ubuntu-latest
    steps:
      - name: Generate pipeline summary
        run: |
          echo "# CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage 1: Infra Init" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Infra Init** | \`${{ needs.infra-init.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage 2: Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Build** | \`${{ needs.docker-build.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Package** | \`${{ needs.docker-package.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Sign** | \`${{ needs.docker-sign.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage 3: Analyze Code" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Cloud Governance** | \`${{ needs.cloud-governance.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Security Scan** | \`${{ needs.security-scan.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **IaC Scan** | \`${{ needs.iac-scan.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage 4: Deploy Master Review" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Master Review** | \`${{ needs.deploy-master-review.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Stage 5: Deploy Review" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Infra Plan** | \`${{ needs.infra-plan.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Infra Review** | \`${{ needs.infra-review.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
