name: Cloud Governance Pipeline

on:
  workflow_call:
    inputs:
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      gcp_project_id:
        description: 'GCP project ID to audit'
        required: true
        type: string
      infra_directory:
        description: 'Path to terraform/infra code'
        required: false
        type: string
        default: 'infra'
      policy_directory:
        description: 'Path to OPA/Rego policy files'
        required: false
        type: string
        default: '.github/workflows/shared-services/security/cloud-governance/policies'
      enable_iam_audit:
        description: 'Run IAM audit checks'
        required: false
        type: boolean
        default: true
      enable_cost_check:
        description: 'Run cost/budget checks'
        required: false
        type: boolean
        default: true
      enable_compliance_scan:
        description: 'Run compliance scanning'
        required: false
        type: boolean
        default: true
      enable_policy_check:
        description: 'Run policy-as-code checks'
        required: false
        type: boolean
        default: true
      cost_threshold_monthly:
        description: 'Monthly cost alert threshold in USD'
        required: false
        type: string
        default: '1000'
      severity_threshold:
        description: 'Minimum severity to fail (LOW, MEDIUM, HIGH, CRITICAL)'
        required: false
        type: string
        default: 'HIGH'

env:
  GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}

jobs:

  policy-check:
    name: Policy-as-Code
    if: inputs.enable_policy_check
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Install OPA
        run: |
          if ! command -v opa &> /dev/null; then
            curl -L -o /usr/local/bin/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
            chmod +x /usr/local/bin/opa
          fi
          opa version

      - name: Validate policies
        run: |
          echo "## Policy Validation" >> $GITHUB_STEP_SUMMARY
          if [ -d "${{ inputs.policy_directory }}" ]; then
            opa check ${{ inputs.policy_directory }}/ --strict
            echo "PASSED: All policies are valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "WARNING: No policy directory found at ${{ inputs.policy_directory }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate Terraform plan JSON
        working-directory: ${{ inputs.infra_directory }}
        run: |
          terraform init -backend=false
          terraform plan -out=tfplan 2>/dev/null || true
          terraform show -json tfplan > tfplan.json 2>/dev/null || echo '{}' > tfplan.json

      - name: Evaluate policies against plan
        if: hashFiles(format('{0}/*.rego', inputs.policy_directory)) != ''
        run: |
          RESULT=$(opa eval \
            --data ${{ inputs.policy_directory }}/ \
            --input ${{ inputs.infra_directory }}/tfplan.json \
            "data.governance" \
            --format pretty 2>&1) || true

          echo "## Policy Evaluation Results" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$RESULT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          VIOLATIONS=$(opa eval \
            --data ${{ inputs.policy_directory }}/ \
            --input ${{ inputs.infra_directory }}/tfplan.json \
            "data.governance.deny" \
            --format json 2>/dev/null | jq -r '.result[0].expressions[0].value // []' | jq length)

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "FAILED: $VIOLATIONS policy violation(s) found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "PASSED: No policy violations" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## FAILED: Cloud Governance - Policy Violations\nPolicy-as-code checks failed. See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });

  iam-audit:
    name: IAM Audit
    if: inputs.enable_iam_audit
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Audit IAM bindings
        run: |
          echo "## IAM Audit — $GCP_PROJECT_ID" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Project-level IAM Bindings" >> $GITHUB_STEP_SUMMARY
          BINDINGS=$(gcloud projects get-iam-policy "$GCP_PROJECT_ID" --format=json)
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$BINDINGS" | jq '.bindings' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "$BINDINGS" > iam-bindings.json

      - name: Check overly permissive roles
        run: |
          DANGEROUS_ROLES=("roles/owner" "roles/editor" "roles/iam.securityAdmin" "roles/resourcemanager.projectIamAdmin")
          FOUND=0

          echo "### Overly Permissive Roles Check" >> $GITHUB_STEP_SUMMARY
          echo "| Role | Members | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          for role in "${DANGEROUS_ROLES[@]}"; do
            MEMBERS=$(jq -r --arg r "$role" '.bindings[] | select(.role == $r) | .members[]' iam-bindings.json 2>/dev/null || echo "")
            if [ -n "$MEMBERS" ]; then
              COUNT=$(echo "$MEMBERS" | wc -l)
              echo "| \`$role\` | $COUNT member(s) | WARNING: Review required |" >> $GITHUB_STEP_SUMMARY
              FOUND=$((FOUND + COUNT))
            else
              echo "| \`$role\` | 0 | OK |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ $FOUND -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "WARNING: **$FOUND overly permissive binding(s) found - review recommended**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check service account keys
        run: |
          echo "### Service Account Key Audit" >> $GITHUB_STEP_SUMMARY
          echo "| Service Account | Keys | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|------|--------|" >> $GITHUB_STEP_SUMMARY

          SA_LIST=$(gcloud iam service-accounts list --project="$GCP_PROJECT_ID" --format="value(email)")
          TOTAL_KEYS=0

          for sa in $SA_LIST; do
            KEY_COUNT=$(gcloud iam service-accounts keys list \
              --iam-account="$sa" \
              --managed-by=user \
              --format="value(name)" 2>/dev/null | wc -l)

            if [ "$KEY_COUNT" -gt 0 ]; then
              echo "| \`$sa\` | $KEY_COUNT | WARNING: User-managed keys |" >> $GITHUB_STEP_SUMMARY
              TOTAL_KEYS=$((TOTAL_KEYS + KEY_COUNT))
            else
              echo "| \`$sa\` | 0 | OK |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ $TOTAL_KEYS -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "WARNING: **$TOTAL_KEYS user-managed key(s) found - prefer Workload Identity Federation**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload IAM report
        uses: actions/upload-artifact@v4
        with:
          name: iam-audit-report
          path: iam-bindings.json
          retention-days: 30

  cost-check:
    name: Cost Management
    if: inputs.enable_cost_check
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Check billing budget
        run: |
          echo "## Cost Management — $GCP_PROJECT_ID" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          BILLING_ACCOUNT=$(gcloud billing projects describe "$GCP_PROJECT_ID" --format="value(billingAccountName)" 2>/dev/null || echo "")

          if [ -z "$BILLING_ACCOUNT" ]; then
            echo "WARNING: No billing account linked to project" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Billing Account:** \`$BILLING_ACCOUNT\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Scan for expensive resources
        run: |
          echo "### Active Resources" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Type | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|-------|" >> $GITHUB_STEP_SUMMARY

          GCE_COUNT=$(gcloud compute instances list --project="$GCP_PROJECT_ID" --format="value(name)" 2>/dev/null | wc -l)
          GKE_COUNT=$(gcloud container clusters list --project="$GCP_PROJECT_ID" --format="value(name)" 2>/dev/null | wc -l)
          SQL_COUNT=$(gcloud sql instances list --project="$GCP_PROJECT_ID" --format="value(name)" 2>/dev/null | wc -l)
          LB_COUNT=$(gcloud compute forwarding-rules list --project="$GCP_PROJECT_ID" --format="value(name)" 2>/dev/null | wc -l)
          DISK_COUNT=$(gcloud compute disks list --project="$GCP_PROJECT_ID" --filter="NOT users:*" --format="value(name)" 2>/dev/null | wc -l)

          echo "| Compute instances | $GCE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| GKE clusters | $GKE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud SQL instances | $SQL_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Load balancers | $LB_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| **Unattached disks** | **$DISK_COUNT** |" >> $GITHUB_STEP_SUMMARY

          if [ "$DISK_COUNT" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "WARNING: **$DISK_COUNT unattached disk(s) - consider deleting to save costs**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check resource labels
        run: |
          echo "### Resource Labeling Compliance" >> $GITHUB_STEP_SUMMARY
          REQUIRED_LABELS=("environment" "team" "cost-center")
          UNLABELED=0

          INSTANCES=$(gcloud compute instances list --project="$GCP_PROJECT_ID" --format=json 2>/dev/null || echo "[]")
          TOTAL=$(echo "$INSTANCES" | jq length)

          for label in "${REQUIRED_LABELS[@]}"; do
            MISSING=$(echo "$INSTANCES" | jq --arg l "$label" '[.[] | select(.labels[$l] == null)] | length')
            if [ "$MISSING" -gt 0 ]; then
              echo "- WARNING: **$MISSING** of **$TOTAL** instances missing label \`$label\`" >> $GITHUB_STEP_SUMMARY
              UNLABELED=$((UNLABELED + MISSING))
            fi
          done

          if [ "$UNLABELED" -eq 0 ]; then
            echo "PASSED: All instances have required labels" >> $GITHUB_STEP_SUMMARY
          fi

  compliance-scan:
    name: Compliance Scan
    if: inputs.enable_compliance_scan
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GCP authentication
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Network security audit
        run: |
          echo "## Compliance Scan — $GCP_PROJECT_ID" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Network Security" >> $GITHUB_STEP_SUMMARY
          echo "| Rule | Source | Ports | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY

          RULES=$(gcloud compute firewall-rules list --project="$GCP_PROJECT_ID" --format=json 2>/dev/null || echo "[]")

          echo "$RULES" | jq -c '.[]' | while read -r rule; do
            NAME=$(echo "$rule" | jq -r '.name')
            SOURCES=$(echo "$rule" | jq -r '.sourceRanges // [] | join(", ")')
            ALLOWED=$(echo "$rule" | jq -r '.allowed[]? | "\(.IPProtocol):\(.ports // ["all"] | join(","))"' | tr '\n' ' ')

            if echo "$SOURCES" | grep -q "0.0.0.0/0"; then
              echo "| \`$NAME\` | \`$SOURCES\` | $ALLOWED | WARNING: Open to internet |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$NAME\` | \`$SOURCES\` | $ALLOWED | OK |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Storage bucket security
        run: |
          echo "### Storage Bucket Security" >> $GITHUB_STEP_SUMMARY
          echo "| Bucket | Public Access | Versioning | Encryption |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------- |------------|------------|" >> $GITHUB_STEP_SUMMARY

          BUCKETS=$(gcloud storage buckets list --project="$GCP_PROJECT_ID" --format=json 2>/dev/null || echo "[]")

          echo "$BUCKETS" | jq -c '.[]' | while read -r bucket; do
            NAME=$(echo "$bucket" | jq -r '.name')
            PUBLIC=$(echo "$bucket" | jq -r 'if .iamConfiguration.publicAccessPrevention == "enforced" then "OK: Blocked" else "WARNING: Allowed" end')
            VERSIONING=$(echo "$bucket" | jq -r 'if .versioning.enabled == true then "OK: On" else "WARNING: Off" end')
            ENCRYPTION=$(echo "$bucket" | jq -r 'if .encryption.defaultKmsKeyName then "OK: CMEK" else "NOTE: Google-managed" end')

            echo "| \`$NAME\` | $PUBLIC | $VERSIONING | $ENCRYPTION |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Logging and monitoring check
        run: |
          echo "### Logging & Monitoring" >> $GITHUB_STEP_SUMMARY

          AUDIT_CONFIGS=$(gcloud projects get-iam-policy "$GCP_PROJECT_ID" --format=json | jq '.auditConfigs // []')
          AUDIT_COUNT=$(echo "$AUDIT_CONFIGS" | jq length)

          if [ "$AUDIT_COUNT" -gt 0 ]; then
            echo "- PASSED: **$AUDIT_COUNT** audit log configuration(s) active" >> $GITHUB_STEP_SUMMARY
          else
            echo "- WARNING: No audit logging configured" >> $GITHUB_STEP_SUMMARY
          fi

          SINKS=$(gcloud logging sinks list --project="$GCP_PROJECT_ID" --format="value(name)" 2>/dev/null | wc -l)
          if [ "$SINKS" -gt 0 ]; then
            echo "- PASSED: **$SINKS** log sink(s) configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- WARNING: No log sinks configured - logs may not be exported" >> $GITHUB_STEP_SUMMARY
          fi

      - name: API services check
        run: |
          echo "### Enabled APIs" >> $GITHUB_STEP_SUMMARY
          SENSITIVE_APIS=("sqladmin.googleapis.com" "compute.googleapis.com" "container.googleapis.com" "iam.googleapis.com" "cloudkms.googleapis.com" "secretmanager.googleapis.com")

          ENABLED=$(gcloud services list --enabled --project="$GCP_PROJECT_ID" --format="value(config.name)" 2>/dev/null)

          echo "| API | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          for api in "${SENSITIVE_APIS[@]}"; do
            if echo "$ENABLED" | grep -q "$api"; then
              echo "| \`$api\` | Enabled |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$api\` | Not enabled |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  summary:
    name: Governance Summary
    if: always()
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    needs: [policy-check, iam-audit, cost-check, compliance-scan]
    steps:
      - name: Generate summary
        run: |
          echo "## Cloud Governance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Policy-as-Code** | \`${{ needs.policy-check.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **IAM Audit** | \`${{ needs.iam-audit.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cost Management** | \`${{ needs.cost-check.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Compliance Scan** | \`${{ needs.compliance-scan.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Project** | \`${{ inputs.gcp_project_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
