name: Secret Rotation

on:
  workflow_call:
    inputs:
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      gcp_project_id:
        description: 'GCP project ID'
        required: true
        type: string
      rotation_targets:
        description: 'Comma-separated targets to rotate: sa-keys, secrets'
        required: false
        type: string
        default: 'sa-keys,secrets'
      sa_key_max_age_days:
        description: 'Max age for SA keys before rotation (days)'
        required: false
        type: number
        default: 90
      secret_names:
        description: 'Comma-separated GCP Secret Manager secret names to audit'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Audit only, do not rotate'
        required: false
        type: boolean
        default: true
      notify_channel:
        description: 'Notification channel: slack, teams, or none'
        required: false
        type: string
        default: 'none'
      slack_webhook_url:
        description: 'Slack webhook for rotation alerts'
        required: false
        type: string
        default: ''
      teams_webhook_url:
        description: 'Teams webhook for rotation alerts'
        required: false
        type: string
        default: ''

jobs:
  audit-sa-keys:
    name: Audit Service Account Keys
    if: contains(inputs.rotation_targets, 'sa-keys')
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      id-token: write
      contents: read
    outputs:
      expired_keys: ${{ steps.audit.outputs.expired_count }}
      rotated_keys: ${{ steps.rotate.outputs.rotated_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Audit SA keys
        id: audit
        env:
          GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
          MAX_AGE_DAYS: ${{ inputs.sa_key_max_age_days }}
        run: |
          set -euo pipefail
          echo "## Service Account Key Audit" >> $GITHUB_STEP_SUMMARY
          echo "| Service Account | Key ID | Age (days) | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|--------|------------|--------|" >> $GITHUB_STEP_SUMMARY

          SA_LIST=$(gcloud iam service-accounts list \
            --project="$GCP_PROJECT_ID" \
            --format="value(email)" 2>/dev/null || echo "")

          EXPIRED=0
          TOTAL=0
          EXPIRED_KEYS_JSON="[]"
          NOW=$(date +%s)

          for sa in $SA_LIST; do
            KEYS=$(gcloud iam service-accounts keys list \
              --iam-account="$sa" \
              --managed-by=user \
              --format=json 2>/dev/null || echo "[]")

            echo "$KEYS" | jq -c '.[]' 2>/dev/null | while read -r key; do
              KEY_ID=$(echo "$key" | jq -r '.name' | awk -F'/' '{print $NF}')
              CREATED=$(echo "$key" | jq -r '.validAfterTime')
              CREATED_TS=$(date -d "$CREATED" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$CREATED" +%s 2>/dev/null || echo "0")
              AGE_DAYS=$(( (NOW - CREATED_TS) / 86400 ))
              TOTAL=$((TOTAL + 1))

              SHORT_ID="${KEY_ID:0:12}..."
              if [ "$AGE_DAYS" -ge "$MAX_AGE_DAYS" ]; then
                echo "| \`$sa\` | \`$SHORT_ID\` | $AGE_DAYS | EXPIRED |" >> $GITHUB_STEP_SUMMARY
                EXPIRED=$((EXPIRED + 1))
                EXPIRED_KEYS_JSON=$(echo "$EXPIRED_KEYS_JSON" | jq --arg sa "$sa" --arg kid "$KEY_ID" '. += [{"sa": $sa, "key_id": $kid}]')
              else
                echo "| \`$sa\` | \`$SHORT_ID\` | $AGE_DAYS | OK |" >> $GITHUB_STEP_SUMMARY
              fi
            done
          done

          echo "expired_count=$EXPIRED" >> $GITHUB_OUTPUT
          echo "$EXPIRED_KEYS_JSON" > /tmp/expired-keys.json
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total keys:** $TOTAL | **Expired (>$MAX_AGE_DAYS days):** $EXPIRED" >> $GITHUB_STEP_SUMMARY

      - name: Rotate expired SA keys
        if: inputs.dry_run == false
        id: rotate
        env:
          GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
        run: |
          set -euo pipefail
          ROTATED=0

          if [ ! -f /tmp/expired-keys.json ]; then
            echo "rotated_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          jq -c '.[]' /tmp/expired-keys.json | while read -r entry; do
            SA=$(echo "$entry" | jq -r '.sa')
            KEY_ID=$(echo "$entry" | jq -r '.key_id')

            echo "==> Creating new key for $SA"
            gcloud iam service-accounts keys create /tmp/new-key-${ROTATED}.json \
              --iam-account="$SA" 2>/dev/null || {
                echo "::warning::Failed to create new key for $SA"
                continue
              }

            echo "==> Deleting old key $KEY_ID for $SA"
            gcloud iam service-accounts keys delete "$KEY_ID" \
              --iam-account="$SA" --quiet 2>/dev/null || {
                echo "::warning::Failed to delete old key for $SA"
              }

            ROTATED=$((ROTATED + 1))
          done

          echo "rotated_count=$ROTATED" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Rotated:** $ROTATED key(s)" >> $GITHUB_STEP_SUMMARY

          # Cleanup new key files
          rm -f /tmp/new-key-*.json

  audit-secrets:
    name: Audit Secret Manager
    if: contains(inputs.rotation_targets, 'secrets')
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Audit secrets
        env:
          GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
          SECRET_NAMES: ${{ inputs.secret_names }}
        run: |
          set -euo pipefail
          echo "## Secret Manager Audit" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Versions | Latest Created | Rotation | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|----------------|----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ -n "$SECRET_NAMES" ]; then
            SECRETS=$(echo "$SECRET_NAMES" | tr ',' '\n')
          else
            SECRETS=$(gcloud secrets list --project="$GCP_PROJECT_ID" --format="value(name)" 2>/dev/null || echo "")
          fi

          for secret in $SECRETS; do
            VER_COUNT=$(gcloud secrets versions list "$secret" \
              --project="$GCP_PROJECT_ID" \
              --format="value(name)" 2>/dev/null | wc -l || echo "0")

            LATEST_CREATED=$(gcloud secrets versions list "$secret" \
              --project="$GCP_PROJECT_ID" \
              --sort-by="~createTime" --limit=1 \
              --format="value(createTime)" 2>/dev/null || echo "unknown")

            ROTATION=$(gcloud secrets describe "$secret" \
              --project="$GCP_PROJECT_ID" \
              --format="value(rotation.rotationPeriod)" 2>/dev/null || echo "none")

            if [ "$ROTATION" = "none" ] || [ -z "$ROTATION" ]; then
              STATUS="WARNING: No auto-rotation"
              ROTATION="none"
            else
              STATUS="OK"
            fi

            echo "| \`$secret\` | $VER_COUNT | $LATEST_CREATED | $ROTATION | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done

  notify:
    name: Rotation Notification
    if: always() && inputs.notify_channel != 'none'
    needs: [audit-sa-keys, audit-secrets]
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send notification
        uses: ./.github/workflows/shared-services/foundation/actions/notify
        with:
          channel: ${{ inputs.notify_channel }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}
          title: 'Secret Rotation Audit'
          message: |
            Secret rotation audit completed for project ${{ inputs.gcp_project_id }}.
            SA Keys job: ${{ needs.audit-sa-keys.result || 'skipped' }}
            Secrets job: ${{ needs.audit-secrets.result || 'skipped' }}
            Dry run: ${{ inputs.dry_run }}
          slack_webhook_url: ${{ inputs.slack_webhook_url }}
          teams_webhook_url: ${{ inputs.teams_webhook_url }}
