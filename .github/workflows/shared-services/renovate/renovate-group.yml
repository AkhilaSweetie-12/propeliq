# Renovate Group Configuration
# This file defines grouping strategies for dependency updates

# GitHub Actions Group
github-actions:
  groupName: "GitHub Actions"
  matchManagers:
    - "github-actions"
  matchFileNames:
    - ".github/workflows/**"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "3 days"
  prPriority: 1
  labels:
    - "renovate"
    - "github-actions"
  schedule:
    - "before 6am on monday"

# Node.js Dependencies Group
nodejs:
  groupName: "Node.js Dependencies"
  matchManagers:
    - "npm"
    - "yarn"
  matchFileNames:
    - "package.json"
    - "package-lock.json"
    - "yarn.lock"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "3 days"
  prPriority: 2
  labels:
    - "renovate"
    - "nodejs"
  schedule:
    - "before 6am on monday"

# Python Dependencies Group
python:
  groupName: "Python Dependencies"
  matchManagers:
    - "pip"
    - "pip-compile"
    - "poetry"
  matchFileNames:
    - "requirements.txt"
    - "requirements-dev.txt"
    - "Pipfile"
    - "pyproject.toml"
    - "poetry.lock"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "3 days"
  prPriority: 2
  labels:
    - "renovate"
    - "python"
  schedule:
    - "before 6am on monday"

# Docker Dependencies Group
docker:
  groupName: "Docker Dependencies"
  matchManagers:
    - "dockerfile"
    - "docker-compose"
  matchFileNames:
    - "Dockerfile*"
    - "*.dockerfile"
    - "docker-compose*.yml"
    - "docker-compose*.yaml"
    - "*.yml"
    - "*.yaml"
    - "k8s/*.yaml"
    - "k8s/*.yml"
    - "helm/**/*.yaml"
    - "helm/**/*.yml"
    - "*.tf"
    - "**/*.tf"
    - "*.sh"
    - "*.bash"
    - "*.zsh"
    - "scripts/*"
    - "*.py"
    - "*.js"
    - "*.ts"
    - "*.go"
    - "*.java"
    - "*.cs"
    - "*.rb"
    - "*.php"
    - "*.json"
    - "*.jsonc"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "7 days"
  prPriority: 3
  labels:
    - "renovate"
    - "docker"
    - "containers"
  schedule:
    - "before 6am on monday"

# Terraform Modules Group
terraform:
  groupName: "Terraform Modules"
  matchManagers:
    - "terraform"
  matchFileNames:
    - "**/*.tf"
    - "**/*.tfvars"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "7 days"
  prPriority: 3
  labels:
    - "renovate"
    - "terraform"
  schedule:
    - "before 6am on monday"

# Security Updates Group
security:
  groupName: "Security Updates"
  matchDatasources:
    - "github-tags"
    - "npm"
    - "pypi"
    - "docker"
  matchUpdateTypes:
    - "patch"
    - "minor"
  matchCurrentVersion: "!/^0/"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "1 day"
  prPriority: 0
  labels:
    - "renovate"
    - "security"
  schedule:
    - "every weekday"

# Major Updates Group
major:
  groupName: "Major Updates"
  matchUpdateTypes:
    - "major"
  automerge: false
  prPriority: -1
  labels:
    - "renovate"
    - "major"
  dependencyDashboardApproval: true
  schedule:
    - "before 6am on friday"

# Development Dependencies Group
dev-dependencies:
  groupName: "Development Dependencies"
  matchDepTypes:
    - "devDependencies"
    - "dev-dependencies"
    - "dev"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "3 days"
  prPriority: 3
  labels:
    - "renovate"
    - "dev-deps"
  schedule:
    - "before 6am on monday"

# Angular Dependencies Group
angular:
  groupName: "Angular Dependencies"
  matchPackagePatterns:
    - "@angular/*"
    - "@angular-devkit/*"
    - "@ngtools/*"
  matchManagers:
    - "npm"
    - "yarn"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "7 days"
  prPriority: 2
  labels:
    - "renovate"
    - "angular"
  schedule:
    - "before 6am on monday"

# .NET Dependencies Group
dotnet:
  groupName: ".NET Dependencies"
  matchManagers:
    - "nuget"
    - "dotnet"
  matchFileNames:
    - "*.csproj"
    - "*.sln"
    - "packages.config"
    - "Directory.Build.props"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "3 days"
  prPriority: 2
  labels:
    - "renovate"
    - "dotnet"
  schedule:
    - "before 6am on monday"

# Kubernetes Dependencies Group
kubernetes:
  groupName: "Kubernetes Dependencies"
  matchManagers:
    - "kubernetes"
    - "helm"
  matchFileNames:
    - "**/*.yaml"
    - "**/*.yml"
    - "Chart.yaml"
    - "values.yaml"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "7 days"
  prPriority: 3
  labels:
    - "renovate"
    - "kubernetes"
  schedule:
    - "before 6am on monday"

# Testing Dependencies Group
testing:
  groupName: "Testing Dependencies"
  matchPackagePatterns:
    - "jest"
    - "mocha"
    - "cypress"
    - "playwright"
    - "pytest"
    - "xunit"
    - "nunit"
  matchManagers:
    - "npm"
    - "yarn"
    - "pip"
    - "poetry"
    - "nuget"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "3 days"
  prPriority: 3
  labels:
    - "renovate"
    - "testing"
  schedule:
    - "before 6am on monday"

# Database Dependencies Group
database:
  groupName: "Database Dependencies"
  matchPackagePatterns:
    - "pg"
    - "mysql"
    - "mongodb"
    - "redis"
    - "sqlalchemy"
    - "entity-framework"
  matchManagers:
    - "npm"
    - "yarn"
    - "pip"
    - "poetry"
    - "nuget"
  automerge: true
  automergeType: "pr"
  minimumReleaseAge: "7 days"
  prPriority: 3
  labels:
    - "renovate"
    - "database"
  schedule:
    - "before 6am on monday"
