name: Terraform Unlock

on:
  workflow_call:
    inputs:
      infra_directory:
        description: 'Path to root terraform module'
        required: false
        type: string
        default: 'infra'
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      lock_id:
        description: 'Terraform state lock ID to force-unlock'
        required: true
        type: string
      cloud_provider:
        description: 'Cloud provider (azure, gcp, aws)'
        required: false
        type: string
        default: 'gcp'
      backend_config:
        description: 'Backend config args (key=value, comma-separated)'
        required: false
        type: string
        default: ''

env:
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'
  INFRA_DIR: ${{ inputs.infra_directory }}

jobs:
  unlock:
    name: Force Unlock
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cloud authentication
        uses: ./.github/workflows/shared-services/terraform/actions/cloud-auth
        with:
          cloud_provider: ${{ inputs.cloud_provider }}

      - name: Init
        run: |
          BACKEND_ARGS=""
          if [ -n "${{ inputs.backend_config }}" ]; then
            IFS=',' read -ra CONFIGS <<< "${{ inputs.backend_config }}"
            for config in "${CONFIGS[@]}"; do
              BACKEND_ARGS="$BACKEND_ARGS -backend-config=$config"
            done
          fi
          terraform init $BACKEND_ARGS
        working-directory: ${{ env.INFRA_DIR }}

      - name: Force unlock
        run: terraform force-unlock -force "${{ inputs.lock_id }}"
        working-directory: ${{ env.INFRA_DIR }}
