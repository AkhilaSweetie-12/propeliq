name: Credential Cleanup
description: |
  Clean up temporary credentials, tokens, and sensitive files after pipeline execution.
  Removes GCP credentials, service account keys, and sensitive environment variables.

inputs:
  revoke_gcp_token:
    description: 'Revoke the active gcloud access token'
    required: false
    default: 'true'
  cleanup_credentials_file:
    description: 'Remove application default credentials file'
    required: false
    default: 'true'
  extra_files:
    description: 'Comma-separated list of additional files to remove'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Clean up credentials
      if: always()
      shell: bash
      run: |
        set -uo pipefail

        echo "==> Starting credential cleanup"

        # Revoke gcloud access token
        if [ "${{ inputs.revoke_gcp_token }}" = "true" ]; then
          echo "==> Revoking gcloud access token"
          gcloud auth revoke --all 2>/dev/null || true
        fi

        # Remove application default credentials
        if [ "${{ inputs.cleanup_credentials_file }}" = "true" ]; then
          ADC_PATH="${GOOGLE_APPLICATION_CREDENTIALS:-}"
          if [ -n "$ADC_PATH" ] && [ -f "$ADC_PATH" ]; then
            echo "==> Removing credentials file: $ADC_PATH"
            rm -f "$ADC_PATH"
          fi
          # Default ADC locations
          rm -f "$HOME/.config/gcloud/application_default_credentials.json" 2>/dev/null || true
        fi

        # Remove known temporary credential files
        rm -f /tmp/gcp-sa-key.json 2>/dev/null || true
        rm -f /tmp/gcloud-*.json 2>/dev/null || true

        # Remove extra files
        if [ -n "${{ inputs.extra_files }}" ]; then
          IFS=',' read -ra FILES <<< "${{ inputs.extra_files }}"
          for f in "${FILES[@]}"; do
            f=$(echo "$f" | xargs)
            [ -z "$f" ] && continue
            echo "==> Removing: $f"
            rm -f "$f" 2>/dev/null || true
          done
        fi

        # Clear sensitive environment variables
        echo "GOOGLE_OAUTH_ACCESS_TOKEN=" >> $GITHUB_ENV
        echo "GOOGLE_APPLICATION_CREDENTIALS=" >> $GITHUB_ENV
        echo "TF_VAR_google_oauth_access_token=" >> $GITHUB_ENV
        echo "TF_VAR_google_identity_token=" >> $GITHUB_ENV
        echo "JFROG_ACCESS_TOKEN=" >> $GITHUB_ENV
        echo "ARTIFACTORY_PASSWORD=" >> $GITHUB_ENV
        echo "CONSUL_HTTP_TOKEN=" >> $GITHUB_ENV

        echo "==> Credential cleanup complete"
