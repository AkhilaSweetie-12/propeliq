name: Common Functions
description: |
  Load common bash functions for pipeline use.
  Equivalent to GitLab .foundation-pipeline::common-functions

inputs:
  github_token:
    description: 'GitHub token for PR feedback'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Load common functions
      shell: bash
      run: |
        mkdir -p /tmp/foundation-scripts

        cat << 'COMMON_FUNCTIONS_EOF' > /tmp/foundation-scripts/common-functions.sh
        #!/usr/bin/env bash
        ################################################################################
        # Common functions for GitHub Actions pipelines.
        #
        # Usage in a step:
        #   source /tmp/foundation-scripts/common-functions.sh
        #   require-executables jq curl
        ################################################################################

        require-executables() {
          local pkgsToAdd=()
          for exe in "$@"; do
            command -v "$exe" > /dev/null 2>&1 || pkgsToAdd+=("$exe")
          done
          if test "${#pkgsToAdd[@]}" -eq 0; then return 0; fi
          if command -v apk > /dev/null 2>&1; then
            apk update && apk add "${pkgsToAdd[@]}"
          elif command -v apt-get > /dev/null 2>&1; then
            apt-get update && apt-get install -y "${pkgsToAdd[@]}"
          else
            echo "::error::${pkgsToAdd[*]} not found and cannot be installed"
            exit 139
          fi
        }
        export -f require-executables

        sleep-random() {
          local min="${1:-5}"
          local max="${2:-30}"
          local interval
          interval=$(shuf -i "$min-$max" -n1)
          echo "==> Sleeping for $interval seconds" >&2
          sleep "$interval"
        }
        export -f sleep-random

        retry-random() {
          : "${TRIES:=3}"
          : "${MIN:=5}"
          : "${MAX:=30}"
          local tries=$TRIES
          while true; do
            "$@" && break
            ((tries--))
            test $tries -eq 0 && return 1
            sleep-random "$MIN" "$MAX"
          done
        }
        export -f retry-random

        hash_directory() {
          : "${HASHFUNC:=md5sum}"
          local dirs="$*"
          for dir in $dirs; do
            if ! test -d "$dir" && ! test -f "$dir"; then
              echo "Error, '$dir' does not exist" >&2
              return 11
            fi
          done
          (
            find $dirs -type f -exec "${HASHFUNC}" {} + | LC_ALL=C sort
            find $dirs -type f -perm /111 2>/dev/null | LC_ALL=C sort
          ) | "${HASHFUNC}" | awk '{print $1}'
        }
        export -f hash_directory

        gh-pr-comment() {
          local body="$1"
          if [ -z "${GITHUB_TOKEN:-}" ] && [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::No GitHub token available for PR comment"
            return 0
          fi
          if [ -z "${GITHUB_EVENT_NAME:-}" ] || [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            return 0
          fi
          local pr_number
          pr_number=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then return 0; fi
          gh pr comment "$pr_number" --body "$body" 2>/dev/null || {
            echo "::warning::Failed to post PR comment"
          }
        }
        export -f gh-pr-comment

        echo "==> Foundation common functions loaded"
        COMMON_FUNCTIONS_EOF

        chmod +x /tmp/foundation-scripts/common-functions.sh
        echo "FOUNDATION_SCRIPTS=/tmp/foundation-scripts" >> $GITHUB_ENV
        echo "==> Common functions available at /tmp/foundation-scripts/common-functions.sh"
