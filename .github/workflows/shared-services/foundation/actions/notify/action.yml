name: Pipeline Notification
description: |
  Send pipeline status notifications via Slack, Microsoft Teams, or Email.
  Equivalent to GitLab .foundation-pipeline::m365-email-notify

inputs:
  channel:
    description: 'Notification channel: slack, teams, email, or all'
    required: false
    default: 'slack'
  status:
    description: 'Pipeline status: success, failure, cancelled'
    required: true
  title:
    description: 'Notification title'
    required: false
    default: 'Pipeline Notification'
  message:
    description: 'Custom message body'
    required: false
    default: ''
  slack_webhook_url:
    description: 'Slack incoming webhook URL'
    required: false
    default: ''
  teams_webhook_url:
    description: 'Microsoft Teams incoming webhook URL'
    required: false
    default: ''
  email_to:
    description: 'Comma-separated email addresses'
    required: false
    default: ''
  email_from:
    description: 'Sender email address'
    required: false
    default: 'noreply@pipeline.local'
  smtp_server:
    description: 'SMTP server address'
    required: false
    default: ''
  smtp_port:
    description: 'SMTP server port'
    required: false
    default: '587'
  smtp_username:
    description: 'SMTP username'
    required: false
    default: ''
  smtp_password:
    description: 'SMTP password'
    required: false
    default: ''
  mention_on_failure:
    description: 'Slack user/group IDs to mention on failure (comma-separated)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Build notification payload
      id: payload
      shell: bash
      run: |
        set -euo pipefail

        STATUS="${{ inputs.status }}"
        TITLE="${{ inputs.title }}"
        REPO="${{ github.repository }}"
        BRANCH="${{ github.ref_name }}"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        ACTOR="${{ github.actor }}"
        SHA="${{ github.sha }}"
        SHORT_SHA="${SHA:0:7}"
        CUSTOM_MSG="${{ inputs.message }}"

        case "$STATUS" in
          success)  COLOR="#36a64f"; ICON="[PASSED]" ;;
          failure)  COLOR="#dc3545"; ICON="[FAILED]" ;;
          cancelled) COLOR="#ffc107"; ICON="[CANCELLED]" ;;
          *)        COLOR="#6c757d"; ICON="[INFO]" ;;
        esac

        if [ -z "$CUSTOM_MSG" ]; then
          CUSTOM_MSG="Workflow \`${{ github.workflow }}\` on \`${REPO}\` branch \`${BRANCH}\` — ${STATUS}"
        fi

        # Slack payload
        MENTIONS=""
        if [ "$STATUS" = "failure" ] && [ -n "${{ inputs.mention_on_failure }}" ]; then
          IFS=',' read -ra IDS <<< "${{ inputs.mention_on_failure }}"
          for id in "${IDS[@]}"; do
            MENTIONS="${MENTIONS}<@${id}> "
          done
        fi

        cat > /tmp/slack-payload.json << SLACK_EOF
        {
          "attachments": [{
            "color": "${COLOR}",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "${ICON} ${TITLE}" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Repository:*\n<${{ github.server_url }}/${REPO}|${REPO}>" },
                  { "type": "mrkdwn", "text": "*Branch:*\n\`${BRANCH}\`" },
                  { "type": "mrkdwn", "text": "*Commit:*\n\`${SHORT_SHA}\`" },
                  { "type": "mrkdwn", "text": "*Triggered by:*\n${ACTOR}" }
                ]
              },
              {
                "type": "section",
                "text": { "type": "mrkdwn", "text": "${CUSTOM_MSG} ${MENTIONS}" }
              },
              {
                "type": "actions",
                "elements": [{
                  "type": "button",
                  "text": { "type": "plain_text", "text": "View Run" },
                  "url": "${RUN_URL}"
                }]
              }
            ]
          }]
        }
        SLACK_EOF

        # Teams payload (Adaptive Card)
        cat > /tmp/teams-payload.json << TEAMS_EOF
        {
          "type": "message",
          "attachments": [{
            "contentType": "application/vnd.microsoft.card.adaptive",
            "content": {
              "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "type": "AdaptiveCard",
              "version": "1.4",
              "body": [
                {
                  "type": "TextBlock",
                  "text": "${ICON} ${TITLE}",
                  "weight": "Bolder",
                  "size": "Large",
                  "color": "$( [ "$STATUS" = "success" ] && echo "Good" || echo "Attention" )"
                },
                {
                  "type": "FactSet",
                  "facts": [
                    { "title": "Repository", "value": "${REPO}" },
                    { "title": "Branch", "value": "${BRANCH}" },
                    { "title": "Commit", "value": "${SHORT_SHA}" },
                    { "title": "Triggered by", "value": "${ACTOR}" },
                    { "title": "Status", "value": "${STATUS}" }
                  ]
                },
                {
                  "type": "TextBlock",
                  "text": "${CUSTOM_MSG}",
                  "wrap": true
                }
              ],
              "actions": [{
                "type": "Action.OpenUrl",
                "title": "View Run",
                "url": "${RUN_URL}"
              }]
            }
          }]
        }
        TEAMS_EOF

        # Email body
        cat > /tmp/email-body.html << EMAIL_EOF
        <html><body>
        <h2>${ICON} ${TITLE}</h2>
        <table>
          <tr><td><b>Repository:</b></td><td>${REPO}</td></tr>
          <tr><td><b>Branch:</b></td><td>${BRANCH}</td></tr>
          <tr><td><b>Commit:</b></td><td>${SHORT_SHA}</td></tr>
          <tr><td><b>Triggered by:</b></td><td>${ACTOR}</td></tr>
          <tr><td><b>Status:</b></td><td>${STATUS}</td></tr>
        </table>
        <p>${CUSTOM_MSG}</p>
        <p><a href="${RUN_URL}">View Run</a></p>
        </body></html>
        EMAIL_EOF

    - name: Send Slack notification
      if: (inputs.channel == 'slack' || inputs.channel == 'all') && inputs.slack_webhook_url != ''
      shell: bash
      run: |
        curl -fsSL -X POST "${{ inputs.slack_webhook_url }}" \
          -H "Content-Type: application/json" \
          -d @/tmp/slack-payload.json || echo "::warning::Slack notification failed"

    - name: Send Teams notification
      if: (inputs.channel == 'teams' || inputs.channel == 'all') && inputs.teams_webhook_url != ''
      shell: bash
      run: |
        curl -fsSL -X POST "${{ inputs.teams_webhook_url }}" \
          -H "Content-Type: application/json" \
          -d @/tmp/teams-payload.json || echo "::warning::Teams notification failed"

    - name: Send Email notification
      if: (inputs.channel == 'email' || inputs.channel == 'all') && inputs.email_to != '' && inputs.smtp_server != ''
      shell: bash
      run: |
        if ! command -v sendmail &>/dev/null && ! command -v curl &>/dev/null; then
          echo "::warning::No mail client available, skipping email"
          exit 0
        fi
        # Use curl with SMTP
        curl --url "smtp://${{ inputs.smtp_server }}:${{ inputs.smtp_port }}" \
          --ssl-reqd \
          --mail-from "${{ inputs.email_from }}" \
          --mail-rcpt "${{ inputs.email_to }}" \
          --user "${{ inputs.smtp_username }}:${{ inputs.smtp_password }}" \
          -H "Subject: ${{ inputs.title }} - ${{ inputs.status }}" \
          -H "Content-Type: text/html" \
          -T /tmp/email-body.html || echo "::warning::Email notification failed"

    - name: Cleanup
      if: always()
      shell: bash
      run: rm -f /tmp/slack-payload.json /tmp/teams-payload.json /tmp/email-body.html
