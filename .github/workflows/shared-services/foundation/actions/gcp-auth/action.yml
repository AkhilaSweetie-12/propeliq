name: GCP Authentication
description: |
  Authenticate to GCP using Workload Identity Federation.
  Uses GitHub OIDC token to authenticate directly to GCP without intermediary secrets.

inputs:
  workload_identity_provider:
    description: 'GCP Workload Identity Provider resource name'
    required: true
  service_account:
    description: 'GCP service account email to impersonate'
    required: true
  gcp_project_id:
    description: 'GCP project ID to set as default'
    required: false
    default: ''
  token_format:
    description: 'Token format: access_token or id_token'
    required: false
    default: 'access_token'
  access_token_lifetime:
    description: 'Access token lifetime (e.g. 3600s)'
    required: false
    default: '3600s'
  create_credentials_file:
    description: 'Create application default credentials file'
    required: false
    default: 'true'
  setup_gcloud:
    description: 'Setup and configure gcloud CLI'
    required: false
    default: 'true'

outputs:
  google_oauth_token:
    description: 'Google OAuth access token'
    value: ${{ steps.auth.outputs.access_token }}
  google_identity_token:
    description: 'Google identity token'
    value: ${{ steps.identity.outputs.identity_token }}
  credentials_file_path:
    description: 'Path to application default credentials file'
    value: ${{ steps.auth.outputs.credentials_file_path }}

runs:
  using: composite
  steps:
    - name: Authenticate to GCP via Workload Identity
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}
        token_format: ${{ inputs.token_format }}
        access_token_lifetime: ${{ inputs.access_token_lifetime }}
        create_credentials_file: ${{ inputs.create_credentials_file }}

    - name: Setup gcloud CLI
      if: inputs.setup_gcloud == 'true'
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ inputs.gcp_project_id }}

    - name: Export GCP tokens
      id: identity
      shell: bash
      run: |
        set -euo pipefail

        # Export access token
        ACCESS_TOKEN="${{ steps.auth.outputs.access_token }}"
        if [ -n "$ACCESS_TOKEN" ]; then
          echo "::add-mask::$ACCESS_TOKEN"
          echo "GOOGLE_OAUTH_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV
          echo "TF_VAR_google_oauth_access_token=$ACCESS_TOKEN" >> $GITHUB_ENV
        fi

        # Export credentials file path
        CREDS_FILE="${{ steps.auth.outputs.credentials_file_path }}"
        if [ -n "$CREDS_FILE" ]; then
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_FILE" >> $GITHUB_ENV
        fi

        # Get identity token
        IDENTITY_TOKEN=""
        if gcloud config get-value account 2>/dev/null | grep -q '@'; then
          IDENTITY_TOKEN=$(gcloud auth print-identity-token 2>/dev/null || echo "")
          if [ -n "$IDENTITY_TOKEN" ]; then
            echo "::add-mask::$IDENTITY_TOKEN"
            echo "TF_VAR_google_identity_token=$IDENTITY_TOKEN" >> $GITHUB_ENV
          fi
        fi
        echo "identity_token=$IDENTITY_TOKEN" >> $GITHUB_OUTPUT

        # Set default project
        if [ -n "${{ inputs.gcp_project_id }}" ]; then
          echo "GCP_PROJECT_ID=${{ inputs.gcp_project_id }}" >> $GITHUB_ENV
          echo "CLOUDSDK_CORE_PROJECT=${{ inputs.gcp_project_id }}" >> $GITHUB_ENV
        fi

        echo "==> GCP authentication successful"
        gcloud config list account --format="value(core.account)" 2>/dev/null || true
