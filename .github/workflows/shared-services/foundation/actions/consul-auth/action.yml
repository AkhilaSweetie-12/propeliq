name: Consul Authentication
description: |
  Authenticate to Consul using a token stored in GCP Secret Manager.

inputs:
  gcp_project_id:
    description: 'GCP project ID containing the Consul secret'
    required: true
  token_secret_name:
    description: 'GCP Secret Manager secret name for Consul token'
    required: false
    default: 'consul-token'
  consul_addr:
    description: 'Consul server address (optional, exported as CONSUL_HTTP_ADDR)'
    required: false
    default: ''

outputs:
  consul_token:
    description: 'Consul authentication token'
    value: ${{ steps.consul-auth.outputs.consul_token }}

runs:
  using: composite
  steps:
    - name: Fetch Consul token from GCP Secret Manager
      id: consul-auth
      shell: bash
      env:
        GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
        TOKEN_SECRET: ${{ inputs.token_secret_name }}
        CONSUL_ADDR: ${{ inputs.consul_addr }}
      run: |
        set -euo pipefail

        echo "==> Fetching Consul token from GCP Secret Manager: $TOKEN_SECRET"
        CONSUL_TOKEN=$(gcloud secrets versions access latest \
          --secret="$TOKEN_SECRET" \
          --project="$GCP_PROJECT_ID") || {
          echo "::error::Failed to fetch secret '$TOKEN_SECRET' from project '$GCP_PROJECT_ID'"
          exit 1
        }

        echo "::add-mask::$CONSUL_TOKEN"
        echo "consul_token=$CONSUL_TOKEN" >> $GITHUB_OUTPUT
        echo "CONSUL_HTTP_TOKEN=$CONSUL_TOKEN" >> $GITHUB_ENV

        if [ -n "$CONSUL_ADDR" ]; then
          echo "CONSUL_HTTP_ADDR=$CONSUL_ADDR" >> $GITHUB_ENV
        fi

        echo "==> Consul token obtained"
