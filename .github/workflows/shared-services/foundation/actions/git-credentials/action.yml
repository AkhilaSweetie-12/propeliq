name: Git Configure Credentials
description: |
  Configure git credentials for cloning dependent modules.
  Equivalent to GitLab .foundation-pipeline::git-configure-credentials

inputs:
  github_token:
    description: 'GitHub token for authenticated git operations'
    required: true
  bot_username:
    description: 'Bot username for git commits'
    required: false
    default: 'github-actions[bot]'
  bot_email:
    description: 'Bot email for git commits'
    required: false
    default: 'github-actions[bot]@users.noreply.github.com'
  bitbucket_username:
    description: 'Bitbucket username (optional, for cross-platform repos)'
    required: false
    default: ''
  bitbucket_password:
    description: 'Bitbucket password/token (optional)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Configure git credentials
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        BOT_USERNAME: ${{ inputs.bot_username }}
        BOT_EMAIL: ${{ inputs.bot_email }}
        BITBUCKET_USERNAME: ${{ inputs.bitbucket_username }}
        BITBUCKET_PASSWORD: ${{ inputs.bitbucket_password }}
      run: |
        set -euo pipefail

        git config --global --add safe.directory "*"

        # GitHub credentials via token
        echo "==> Setting git credentials for GitHub"
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"

        # Bitbucket credentials (cross-platform support)
        if [ -n "$BITBUCKET_USERNAME" ] && [ -n "$BITBUCKET_PASSWORD" ]; then
          echo "==> Setting git credentials for Bitbucket user: $BITBUCKET_USERNAME"
          mkdir -p ~/.config/git
          echo "https://${BITBUCKET_USERNAME}:${BITBUCKET_PASSWORD}@bitbucket.org" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
        fi

        # Configure bot identity for commits
        git config --global user.name "$BOT_USERNAME"
        git config --global user.email "$BOT_EMAIL"
        echo "==> Git configured as $BOT_USERNAME <$BOT_EMAIL>"
