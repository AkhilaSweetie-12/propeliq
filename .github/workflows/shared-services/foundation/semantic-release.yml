name: Semantic Release

on:
  workflow_call:
    inputs:
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      default_branch:
        description: 'Default branch for releases'
        required: false
        type: string
        default: 'main'
      dry_run:
        description: 'Run in dry-run mode (no tags/releases)'
        required: false
        type: boolean
        default: false
      extra_plugins:
        description: 'Space-separated list of extra semantic-release plugins'
        required: false
        type: string
        default: ''
    outputs:
      new_release_published:
        description: 'Whether a new release was published'
        value: ${{ jobs.release.outputs.new_release_published }}
      new_release_version:
        description: 'The new release version'
        value: ${{ jobs.release.outputs.new_release_version }}

jobs:
  release:
    name: Semantic Release
    if: github.ref == format('refs/heads/{0}', inputs.default_branch)
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git credentials
        uses: ./.github/workflows/shared-services/foundation/actions/git-credentials
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install semantic-release
        run: |
          npm install --location=global \
            semantic-release \
            @semantic-release/github \
            @semantic-release/changelog \
            @semantic-release/git \
            conventional-changelog-conventionalcommits \
            ${{ inputs.extra_plugins }}

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          if [ -f .releaserc.json ] || [ -f .releaserc.yml ] || [ -f .releaserc ] || [ -f release.config.js ]; then
            echo "==> Using project release configuration"
            npx semantic-release $DRY_RUN_FLAG --branches ${{ inputs.default_branch }}
          else
            echo "==> Using default conventional commits preset"
            npx semantic-release \
              --plugins "@semantic-release/commit-analyzer" "@semantic-release/release-notes-generator" "@semantic-release/github" \
              --preset conventionalcommits \
              --branches ${{ inputs.default_branch }} \
              $DRY_RUN_FLAG
          fi

          # Capture outputs
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=${LATEST_TAG#v}" >> $GITHUB_OUTPUT
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "new_release_version=" >> $GITHUB_OUTPUT
          fi
