name: Artifact Publish

on:
  workflow_call:
    inputs:
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      artifact_type:
        description: 'Artifact type: docker, helm, npm, generic'
        required: true
        type: string
      docker_context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      docker_file:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      docker_registry:
        description: 'Docker registry (ghcr.io, gcr.io, artifactory URL)'
        required: false
        type: string
        default: 'ghcr.io'
      image_name:
        description: 'Docker image name (without registry prefix)'
        required: false
        type: string
        default: ''
      image_tags:
        description: 'Comma-separated image tags'
        required: false
        type: string
        default: ''
      helm_chart_path:
        description: 'Path to Helm chart directory'
        required: false
        type: string
        default: './charts/app'
      helm_registry:
        description: 'Helm OCI registry URL'
        required: false
        type: string
        default: ''
      npm_registry:
        description: 'npm registry URL'
        required: false
        type: string
        default: 'https://npm.pkg.github.com'
      npm_scope:
        description: 'npm scope (e.g. @myorg)'
        required: false
        type: string
        default: ''
      generic_source_path:
        description: 'Source path for generic artifact upload'
        required: false
        type: string
        default: ''
      generic_target_repo:
        description: 'Artifactory target repo for generic upload'
        required: false
        type: string
        default: ''
      artifactory_url:
        description: 'Artifactory server URL'
        required: false
        type: string
        default: ''
      version:
        description: 'Artifact version (auto-detected if empty)'
        required: false
        type: string
        default: ''
      push:
        description: 'Push artifact to registry (false = build only)'
        required: false
        type: boolean
        default: true
    outputs:
      artifact_version:
        description: 'Published artifact version'
        value: ${{ jobs.publish.outputs.version }}
      artifact_digest:
        description: 'Published artifact digest (Docker/Helm)'
        value: ${{ jobs.publish.outputs.digest }}

jobs:
  publish:
    name: Publish ${{ inputs.artifact_type }}
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.publish.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VER="${{ inputs.version }}"
          if [ -z "$VER" ]; then
            VER=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            VER="${VER#v}"
          fi
          if [ -z "$VER" ]; then
            VER="0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "==> Artifact version: $VER"

      # --- Docker ---
      - name: Set up Docker Buildx
        if: inputs.artifact_type == 'docker'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        if: inputs.artifact_type == 'docker' && inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.docker_registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: inputs.artifact_type == 'docker'
        id: docker-push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.docker_file }}
          push: ${{ inputs.push }}
          tags: |
            ${{ inputs.docker_registry }}/${{ inputs.image_name || github.repository }}:${{ steps.version.outputs.version }}
            ${{ inputs.docker_registry }}/${{ inputs.image_name || github.repository }}:latest
            ${{ inputs.docker_registry }}/${{ inputs.image_name || github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      # --- Helm ---
      - name: Package Helm chart
        if: inputs.artifact_type == 'helm'
        run: |
          VER="${{ steps.version.outputs.version }}"
          echo "==> Packaging Helm chart at ${{ inputs.helm_chart_path }} (v${VER})"
          helm package "${{ inputs.helm_chart_path }}" --version "$VER" --app-version "$VER" -d /tmp/helm-pkg
          ls -la /tmp/helm-pkg/

      - name: Push Helm chart
        if: inputs.artifact_type == 'helm' && inputs.push && inputs.helm_registry != ''
        id: helm-push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${{ inputs.helm_registry }}" --username "${{ github.actor }}" --password-stdin
          CHART_FILE=$(ls /tmp/helm-pkg/*.tgz | head -1)
          helm push "$CHART_FILE" "oci://${{ inputs.helm_registry }}"
          echo "==> Helm chart pushed to ${{ inputs.helm_registry }}"

      # --- npm ---
      - name: Setup npm auth
        if: inputs.artifact_type == 'npm'
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          if [ -n "${{ inputs.npm_scope }}" ]; then
            echo "${{ inputs.npm_scope }}:registry=${{ inputs.npm_registry }}" >> ~/.npmrc
          fi

      - name: Publish npm package
        if: inputs.artifact_type == 'npm' && inputs.push
        run: |
          VER="${{ steps.version.outputs.version }}"
          npm version "$VER" --no-git-tag-version --allow-same-version 2>/dev/null || true
          npm publish --access public 2>/dev/null || npm publish
          echo "==> npm package published: v${VER}"

      # --- Generic (Artifactory) ---
      - name: Upload generic artifact
        if: inputs.artifact_type == 'generic' && inputs.push && inputs.artifactory_url != ''
        run: |
          set -euo pipefail
          SOURCE="${{ inputs.generic_source_path }}"
          TARGET="${{ inputs.generic_target_repo }}"
          VER="${{ steps.version.outputs.version }}"

          if [ -z "$SOURCE" ] || [ -z "$TARGET" ]; then
            echo "::error::generic_source_path and generic_target_repo are required"
            exit 1
          fi

          FILENAME=$(basename "$SOURCE")
          UPLOAD_URL="${{ inputs.artifactory_url }}/artifactory/${TARGET}/${VER}/${FILENAME}"

          echo "==> Uploading $SOURCE to $UPLOAD_URL"
          curl -fsSL -X PUT "$UPLOAD_URL" \
            -H "Authorization: Bearer ${{ secrets.JFROG_ACCESS_TOKEN || '' }}" \
            -T "$SOURCE"
          echo "==> Generic artifact uploaded"

      - name: Capture digest
        id: publish
        if: always()
        run: |
          DIGEST=""
          if [ "${{ inputs.artifact_type }}" = "docker" ]; then
            DIGEST="${{ steps.docker-push.outputs.digest || '' }}"
          fi
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Publish summary
        if: always()
        run: |
          echo "## Artifact Publish" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | \`${{ inputs.artifact_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Push** | \`${{ inputs.push }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
