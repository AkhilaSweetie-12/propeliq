name: Environment Manager

on:
  workflow_call:
    inputs:
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      action:
        description: 'Action to perform: create, update, or destroy'
        required: true
        type: string
      cluster_name:
        description: 'GKE cluster name'
        required: true
        type: string
      cluster_zone:
        description: 'GKE cluster zone or region'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP project ID'
        required: true
        type: string
      namespace_prefix:
        description: 'Namespace prefix for ephemeral environments'
        required: false
        type: string
        default: 'pr'
      pr_number:
        description: 'Pull request number (used for namespace naming)'
        required: false
        type: string
        default: ''
      deploy_method:
        description: 'Deployment method: helm, kubectl, or kustomize'
        required: false
        type: string
        default: 'helm'
      helm_chart_path:
        description: 'Path to Helm chart'
        required: false
        type: string
        default: './charts/app'
      helm_values_file:
        description: 'Path to Helm values file for review envs'
        required: false
        type: string
        default: ''
      image_repository:
        description: 'Container image repository'
        required: false
        type: string
        default: ''
      image_tag:
        description: 'Container image tag'
        required: false
        type: string
        default: '${{ github.sha }}'
      ttl_hours:
        description: 'Time-to-live for ephemeral env (hours). 0 = no TTL.'
        required: false
        type: number
        default: 48
      resource_limits_cpu:
        description: 'CPU limit per container for review envs'
        required: false
        type: string
        default: '250m'
      resource_limits_memory:
        description: 'Memory limit per container for review envs'
        required: false
        type: string
        default: '256Mi'
    outputs:
      namespace:
        description: 'Created namespace name'
        value: ${{ jobs.manage.outputs.namespace }}
      environment_url:
        description: 'Ephemeral environment URL'
        value: ${{ jobs.manage.outputs.env_url }}

jobs:
  manage:
    name: ${{ inputs.action }} Environment
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      namespace: ${{ steps.ns.outputs.namespace }}
      env_url: ${{ steps.deploy.outputs.env_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials \
            "${{ inputs.cluster_name }}" \
            --zone "${{ inputs.cluster_zone }}" \
            --project "${{ inputs.gcp_project_id }}"

      - name: Determine namespace
        id: ns
        run: |
          PR="${{ inputs.pr_number }}"
          if [ -z "$PR" ]; then
            PR=$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "")
          fi
          if [ -z "$PR" ]; then
            PR=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g' | head -c 40)
          fi
          NS="${{ inputs.namespace_prefix }}-${PR}"
          echo "namespace=$NS" >> $GITHUB_OUTPUT
          echo "==> Target namespace: $NS"

      - name: Create namespace
        if: inputs.action == 'create' || inputs.action == 'update'
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          kubectl get namespace "$NS" 2>/dev/null || kubectl create namespace "$NS"

          # Label for TTL cleanup
          TTL=${{ inputs.ttl_hours }}
          EXPIRY=$(date -u -d "+${TTL} hours" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                   date -u -v+${TTL}H +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo "")

          kubectl label namespace "$NS" \
            app.kubernetes.io/managed-by=github-actions \
            environment=ephemeral \
            pr-number="${{ inputs.pr_number }}" \
            --overwrite

          if [ -n "$EXPIRY" ] && [ "$TTL" -gt 0 ]; then
            kubectl annotate namespace "$NS" \
              "janitor/ttl=${TTL}h" \
              "janitor/expires=${EXPIRY}" \
              --overwrite
            echo "==> Namespace $NS expires at $EXPIRY"
          fi

          # Apply resource quota
          cat <<QUOTA_EOF | kubectl apply -f -
          apiVersion: v1
          kind: ResourceQuota
          metadata:
            name: ephemeral-quota
            namespace: ${NS}
          spec:
            hard:
              requests.cpu: "1"
              requests.memory: 1Gi
              limits.cpu: "2"
              limits.memory: 2Gi
              pods: "20"
          QUOTA_EOF

          # Apply limit range
          cat <<LR_EOF | kubectl apply -f -
          apiVersion: v1
          kind: LimitRange
          metadata:
            name: ephemeral-limits
            namespace: ${NS}
          spec:
            limits:
            - default:
                cpu: ${{ inputs.resource_limits_cpu }}
                memory: ${{ inputs.resource_limits_memory }}
              defaultRequest:
                cpu: 100m
                memory: 128Mi
              type: Container
          LR_EOF

      - name: Deploy to ephemeral environment
        if: inputs.action == 'create' || inputs.action == 'update'
        id: deploy
        run: |
          set -euo pipefail
          NS="${{ steps.ns.outputs.namespace }}"

          if [ "${{ inputs.deploy_method }}" = "helm" ]; then
            RELEASE="review-${{ inputs.pr_number }}"
            ARGS="upgrade --install ${RELEASE} ${{ inputs.helm_chart_path }}"
            ARGS="${ARGS} --namespace ${NS}"
            ARGS="${ARGS} --set image.tag=${{ inputs.image_tag }}"

            if [ -n "${{ inputs.image_repository }}" ]; then
              ARGS="${ARGS} --set image.repository=${{ inputs.image_repository }}"
            fi
            if [ -n "${{ inputs.helm_values_file }}" ]; then
              ARGS="${ARGS} --values ${{ inputs.helm_values_file }}"
            fi

            ARGS="${ARGS} --wait --timeout 5m"
            echo "==> helm ${ARGS}"
            helm ${ARGS}

          elif [ "${{ inputs.deploy_method }}" = "kustomize" ]; then
            kubectl apply -k "${{ inputs.helm_chart_path }}" -n "$NS"

          else
            kubectl apply -f "${{ inputs.helm_chart_path }}" -n "$NS"
          fi

          # Detect service URL
          ENV_URL=""
          SVC=$(kubectl get svc -n "$NS" -o json | jq -r '.items[0].status.loadBalancer.ingress[0].ip // empty' 2>/dev/null || echo "")
          if [ -n "$SVC" ]; then
            PORT=$(kubectl get svc -n "$NS" -o json | jq -r '.items[0].spec.ports[0].port // "80"')
            ENV_URL="http://${SVC}:${PORT}"
          fi

          ING=$(kubectl get ingress -n "$NS" -o json | jq -r '.items[0].spec.rules[0].host // empty' 2>/dev/null || echo "")
          if [ -n "$ING" ]; then
            ENV_URL="https://${ING}"
          fi

          echo "env_url=${ENV_URL}" >> $GITHUB_OUTPUT
          echo "==> Environment URL: ${ENV_URL:-N/A}"

      - name: Destroy ephemeral environment
        if: inputs.action == 'destroy'
        run: |
          NS="${{ steps.ns.outputs.namespace }}"
          echo "==> Destroying namespace: $NS"

          if kubectl get namespace "$NS" 2>/dev/null; then
            # Delete helm releases first
            for release in $(helm list -n "$NS" -q 2>/dev/null); do
              echo "==> Uninstalling helm release: $release"
              helm uninstall "$release" -n "$NS" --wait || true
            done

            kubectl delete namespace "$NS" --wait=true --timeout=120s || {
              echo "::warning::Namespace deletion timed out, forcing"
              kubectl delete namespace "$NS" --force --grace-period=0 || true
            }
            echo "==> Namespace $NS destroyed"
          else
            echo "==> Namespace $NS does not exist, skipping"
          fi

      - name: Comment on PR
        if: (inputs.action == 'create' || inputs.action == 'update') && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const ns = '${{ steps.ns.outputs.namespace }}';
            const url = '${{ steps.deploy.outputs.env_url }}';
            const action = '${{ inputs.action }}';

            let body = `### Ephemeral Environment ${action === 'create' ? 'Created' : 'Updated'}\n\n`;
            body += `| Field | Value |\n|-------|-------|\n`;
            body += `| **Namespace** | \`${ns}\` |\n`;
            body += `| **Cluster** | \`${{ inputs.cluster_name }}\` |\n`;
            body += `| **Image Tag** | \`${{ inputs.image_tag }}\` |\n`;
            if (url) body += `| **URL** | [${url}](${url}) |\n`;
            body += `| **TTL** | ${{ inputs.ttl_hours }}h |\n`;
            body += `\n_Environment will be destroyed when this PR is closed/merged._`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Summary
        if: always()
        run: |
          echo "## Environment Manager" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Action** | \`${{ inputs.action }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | \`${{ steps.ns.outputs.namespace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
