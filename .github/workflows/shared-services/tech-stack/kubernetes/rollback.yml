name: Rollback Deployment

on:
  workflow_call:
    inputs:
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      cluster_name:
        description: 'GKE cluster name'
        required: true
        type: string
      cluster_zone:
        description: 'GKE cluster zone or region'
        required: true
        type: string
      gcp_project_id:
        description: 'GCP project ID'
        required: true
        type: string
      namespace:
        description: 'Kubernetes namespace'
        required: true
        type: string
      rollback_method:
        description: 'Rollback method: kubectl, helm, or terraform'
        required: false
        type: string
        default: 'kubectl'
      helm_release_name:
        description: 'Helm release name (for helm rollback)'
        required: false
        type: string
        default: ''
      helm_revision:
        description: 'Helm revision to roll back to (0 = previous)'
        required: false
        type: number
        default: 0
      deployment_names:
        description: 'Comma-separated deployment names (for kubectl rollback). Empty = all deployments.'
        required: false
        type: string
        default: ''
      terraform_workspace:
        description: 'Terraform workspace (for terraform rollback)'
        required: false
        type: string
        default: 'default'
      infra_directory:
        description: 'Terraform directory (for terraform rollback)'
        required: false
        type: string
        default: 'infra'
      verify_after_rollback:
        description: 'Run health check after rollback'
        required: false
        type: boolean
        default: true
      rollout_timeout:
        description: 'Timeout for rollout verification'
        required: false
        type: string
        default: '5m'
    outputs:
      rollback_status:
        description: 'Rollback result'
        value: ${{ jobs.rollback.outputs.status }}

jobs:
  rollback:
    name: Rollback (${{ inputs.rollback_method }})
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      id-token: write
      contents: read
    outputs:
      status: ${{ steps.result.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        if: inputs.rollback_method != 'terraform'
        run: |
          gcloud container clusters get-credentials \
            "${{ inputs.cluster_name }}" \
            --zone "${{ inputs.cluster_zone }}" \
            --project "${{ inputs.gcp_project_id }}"

      - name: Pre-rollback snapshot
        if: inputs.rollback_method != 'terraform'
        run: |
          echo "## Pre-Rollback State" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n "${{ inputs.namespace }}" -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Rollback via kubectl
        if: inputs.rollback_method == 'kubectl'
        id: kubectl-rollback
        run: |
          set -euo pipefail
          NS="${{ inputs.namespace }}"
          TARGETS="${{ inputs.deployment_names }}"

          if [ -z "$TARGETS" ]; then
            TARGETS=$(kubectl get deployments -n "$NS" -o jsonpath='{.items[*].metadata.name}')
          else
            TARGETS=$(echo "$TARGETS" | tr ',' ' ')
          fi

          FAILED=0
          for dep in $TARGETS; do
            echo "==> Rolling back deployment/$dep in $NS"

            CURRENT_REV=$(kubectl get deployment "$dep" -n "$NS" \
              -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || echo "?")
            echo "    Current revision: $CURRENT_REV"

            kubectl rollout undo deployment/"$dep" -n "$NS" || {
              echo "::error::Rollback failed for deployment/$dep"
              FAILED=1
              continue
            }
            echo "    Rollback initiated"
          done

          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Rollback via Helm
        if: inputs.rollback_method == 'helm'
        id: helm-rollback
        run: |
          set -euo pipefail
          RELEASE="${{ inputs.helm_release_name }}"
          NS="${{ inputs.namespace }}"
          REVISION="${{ inputs.helm_revision }}"

          if [ -z "$RELEASE" ]; then
            RELEASE=$(helm list -n "$NS" -q | head -1)
          fi

          echo "==> Current Helm status:"
          helm status "$RELEASE" -n "$NS" || true

          echo "==> Helm history:"
          helm history "$RELEASE" -n "$NS" --max 5

          echo "==> Rolling back $RELEASE to revision $REVISION"
          helm rollback "$RELEASE" "$REVISION" -n "$NS" --wait --timeout "${{ inputs.rollout_timeout }}"

          echo "==> Post-rollback status:"
          helm status "$RELEASE" -n "$NS"

      - name: Rollback via Terraform
        if: inputs.rollback_method == 'terraform'
        id: tf-rollback
        working-directory: ${{ inputs.infra_directory }}
        run: |
          set -euo pipefail
          echo "==> Initializing Terraform"
          terraform init

          if [ "${{ inputs.terraform_workspace }}" != "default" ]; then
            terraform workspace select "${{ inputs.terraform_workspace }}"
          fi

          echo "==> Generating plan (destroy and recreate)"
          terraform plan -refresh-only -out=rollback.tfplan

          echo "==> Applying refresh-only plan"
          terraform apply rollback.tfplan

          echo "==> Terraform state refreshed"

      - name: Verify rollout
        if: inputs.verify_after_rollback && inputs.rollback_method != 'terraform'
        run: |
          set -euo pipefail
          NS="${{ inputs.namespace }}"
          TARGETS="${{ inputs.deployment_names }}"

          if [ -z "$TARGETS" ]; then
            TARGETS=$(kubectl get deployments -n "$NS" -o jsonpath='{.items[*].metadata.name}')
          else
            TARGETS=$(echo "$TARGETS" | tr ',' ' ')
          fi

          for dep in $TARGETS; do
            echo "==> Waiting for deployment/$dep rollout"
            kubectl rollout status deployment/"$dep" \
              -n "$NS" \
              --timeout="${{ inputs.rollout_timeout }}" || {
                echo "::error::Rollout verification failed for $dep"
                kubectl describe deployment/"$dep" -n "$NS"
                exit 1
              }
          done
          echo "==> All rollouts verified"

      - name: Capture result
        id: result
        if: always()
        run: |
          echo "status=${{ job.status }}" >> $GITHUB_OUTPUT

      - name: Post-rollback summary
        if: always()
        run: |
          echo "## Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Method** | \`${{ inputs.rollback_method }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Namespace** | \`${{ inputs.namespace }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.rollback_method }}" != "terraform" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Post-Rollback Deployments" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl get deployments -n "${{ inputs.namespace }}" -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
