name: Helm Lint & Test

on:
  workflow_call:
    inputs:
      runner_image:
        description: 'CI/CD runner container image'
        required: false
        type: string
        default: 'ghcr.io/${{ github.repository_owner }}/propeliq-runner:latest'
      chart_path:
        description: 'Path to Helm chart directory'
        required: false
        type: string
        default: './charts/app'
      values_files:
        description: 'Comma-separated list of values files to lint against'
        required: false
        type: string
        default: ''
      strict:
        description: 'Enable strict linting (fail on warnings)'
        required: false
        type: boolean
        default: true
      kube_version:
        description: 'Kubernetes version for template validation'
        required: false
        type: string
        default: '1.29.0'
      enable_template_test:
        description: 'Render templates and validate output'
        required: false
        type: boolean
        default: true
      enable_schema_validation:
        description: 'Validate values against JSON schema if present'
        required: false
        type: boolean
        default: true
      enable_kubeconform:
        description: 'Validate rendered manifests with kubeconform'
        required: false
        type: boolean
        default: true
      additional_helm_repos:
        description: 'Comma-separated Helm repos to add (name=url format)'
        required: false
        type: string
        default: ''

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.runner_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          helm version || {
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          }
          if [ "${{ inputs.enable_kubeconform }}" = "true" ]; then
            KUBECONFORM_VERSION="v0.6.4"
            curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
              | tar xz -C /usr/local/bin kubeconform
          fi

      - name: Add Helm repos
        if: inputs.additional_helm_repos != ''
        run: |
          IFS=',' read -ra REPOS <<< "${{ inputs.additional_helm_repos }}"
          for repo in "${REPOS[@]}"; do
            NAME="${repo%%=*}"
            URL="${repo##*=}"
            echo "==> Adding repo: $NAME -> $URL"
            helm repo add "$NAME" "$URL"
          done
          helm repo update

      - name: Update dependencies
        run: |
          CHART="${{ inputs.chart_path }}"
          if [ -f "$CHART/Chart.lock" ] || [ -f "$CHART/Chart.yaml" ]; then
            helm dependency update "$CHART" 2>/dev/null || true
          fi

      - name: Helm lint
        id: lint
        run: |
          set -euo pipefail
          CHART="${{ inputs.chart_path }}"
          ARGS=""

          if [ "${{ inputs.strict }}" = "true" ]; then
            ARGS="$ARGS --strict"
          fi

          if [ -n "${{ inputs.values_files }}" ]; then
            IFS=',' read -ra FILES <<< "${{ inputs.values_files }}"
            for f in "${FILES[@]}"; do
              ARGS="$ARGS -f $f"
            done
          fi

          echo "==> Running: helm lint $CHART $ARGS"
          helm lint "$CHART" $ARGS

          echo "## Helm Lint" >> $GITHUB_STEP_SUMMARY
          echo "PASSED: Chart \`$CHART\` passed linting" >> $GITHUB_STEP_SUMMARY

      - name: Template render test
        if: inputs.enable_template_test
        id: template
        run: |
          set -euo pipefail
          CHART="${{ inputs.chart_path }}"
          ARGS="--kube-version ${{ inputs.kube_version }}"

          if [ -n "${{ inputs.values_files }}" ]; then
            IFS=',' read -ra FILES <<< "${{ inputs.values_files }}"
            for f in "${FILES[@]}"; do
              ARGS="$ARGS -f $f"
            done
          fi

          echo "==> Rendering templates"
          helm template test-release "$CHART" $ARGS > /tmp/rendered.yaml

          RESOURCE_COUNT=$(grep -c '^kind:' /tmp/rendered.yaml || echo "0")
          echo "==> Rendered $RESOURCE_COUNT resources"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Template Render" >> $GITHUB_STEP_SUMMARY
          echo "PASSED: Rendered $RESOURCE_COUNT resources from \`$CHART\`" >> $GITHUB_STEP_SUMMARY

      - name: Kubeconform validation
        if: inputs.enable_kubeconform && inputs.enable_template_test
        run: |
          set -euo pipefail

          if [ ! -f /tmp/rendered.yaml ]; then
            echo "::warning::No rendered templates found, skipping kubeconform"
            exit 0
          fi

          echo "==> Validating rendered manifests against K8s ${{ inputs.kube_version }} schema"
          kubeconform \
            -kubernetes-version "${{ inputs.kube_version }}" \
            -summary \
            -output text \
            -strict \
            /tmp/rendered.yaml

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Kubeconform" >> $GITHUB_STEP_SUMMARY
          echo "PASSED: All manifests valid for K8s ${{ inputs.kube_version }}" >> $GITHUB_STEP_SUMMARY

      - name: Schema validation
        if: inputs.enable_schema_validation
        run: |
          CHART="${{ inputs.chart_path }}"
          SCHEMA="$CHART/values.schema.json"

          if [ ! -f "$SCHEMA" ]; then
            echo "==> No values.schema.json found, skipping schema validation"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Schema Validation" >> $GITHUB_STEP_SUMMARY
            echo "SKIPPED: No \`values.schema.json\` present" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "==> Validating values.yaml against schema"
          helm lint "$CHART" --strict
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Schema Validation" >> $GITHUB_STEP_SUMMARY
          echo "PASSED: values.yaml conforms to schema" >> $GITHUB_STEP_SUMMARY

      - name: Chart metadata check
        run: |
          set -euo pipefail
          CHART="${{ inputs.chart_path }}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Chart Metadata" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY

          NAME=$(grep '^name:' "$CHART/Chart.yaml" | awk '{print $2}')
          VERSION=$(grep '^version:' "$CHART/Chart.yaml" | awk '{print $2}')
          APP_VERSION=$(grep '^appVersion:' "$CHART/Chart.yaml" | awk '{print $2}' | tr -d '"')
          TYPE=$(grep '^type:' "$CHART/Chart.yaml" | awk '{print $2}')

          echo "| **Name** | \`$NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **App Version** | \`$APP_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | \`$TYPE\` |" >> $GITHUB_STEP_SUMMARY

          # Verify required fields
          ERRORS=0
          for field in name version appVersion; do
            if ! grep -q "^${field}:" "$CHART/Chart.yaml"; then
              echo "::error::Missing required field '$field' in Chart.yaml"
              ERRORS=$((ERRORS + 1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi
